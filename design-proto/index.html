<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>discovarr · theatre design preview</title>

<!-- Cinema-printing type: billing-block (Saira Extra Condensed) + marquee (Saira Condensed) + body (Mulish). -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600&family=Saira+Condensed:wght@500;700&family=Saira+Extra+Condensed:wght@700;800&display=swap" rel="stylesheet">

<style>
/* ============================================================================
   discovarr — THEATRE DESIGN PREVIEW (throwaway proto for Step 2 sign-off)
   Direction: "The room lit by the screen." The trailer is the hero; the chrome
   is the dark of the cinema, lit by a blurred spill of the film itself.
   ========================================================================= */
:root{
  --auditorium:#0B0A09;   /* warm near-black — the room (not pure #000)        */
  --house:#15120F;        /* letterbox bar / raised surfaces                   */
  --ink:#F2EBDF;          /* warm screen-white                                 */
  --ink-dim:#968C7F;      /* house-lights-down grey                            */
  --marquee:#E9B44C;      /* incandescent marquee-bulb amber — used sparingly  */
  --hair:rgba(242,235,223,.14);
  --billing: "Saira Extra Condensed", "Arial Narrow", sans-serif;
  --display: "Saira Condensed", "Arial Narrow", sans-serif;
  --body: "Mulish", system-ui, sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;height:100%;background:var(--auditorium);color:var(--ink);
  font-family:var(--body);overflow:hidden;}
button{font-family:inherit;color:inherit;}

/* ---- the room ----------------------------------------------------------- */
#room{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}

/* SIGNATURE: light-spill. A heavily blurred, oversized copy of the current
   backdrop bleeds out around the screen — the projector lighting the walls. */
#spill{position:absolute;inset:-12%;background-size:cover;background-position:center;
  filter:blur(90px) saturate(1.5) brightness(.62);transform:scale(1.18);
  opacity:0;transition:opacity 1.1s ease, background-image 0s;z-index:0;}
#room.lit #spill{opacity:.9;}
#vignette{position:absolute;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(120% 90% at 50% 42%, transparent 38%, rgba(0,0,0,.55) 100%);}

/* ---- the screen (letterboxed 16:9) -------------------------------------- */
#screen{position:relative;z-index:2;width:min(96vw, 168vh);aspect-ratio:16/9;
  background:#000;border-radius:6px;overflow:hidden;
  box-shadow:0 0 0 1px rgba(0,0,0,.6), 0 40px 120px rgba(0,0,0,.7);}
#player{position:absolute;inset:0;width:100%;height:100%;border:0;}
/* Transparent cover swallows hover/taps so YouTube chrome never reveals. */
#cover{position:absolute;inset:0;z-index:3;cursor:pointer;}
#poster{position:absolute;inset:0;z-index:2;background:#000 center/cover no-repeat;
  transition:opacity .5s ease;}
#screen.playing #poster{opacity:0;}
#spinner{position:absolute;left:50%;top:50%;width:34px;height:34px;z-index:2;
  margin:-17px;border:3px solid rgba(242,235,223,.25);border-top-color:var(--ink);
  border-radius:50%;animation:spin 1s linear infinite;opacity:0;transition:opacity .2s;}
#screen.buffering #spinner{opacity:.8;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ---- billing block (the lower letterbox bar = part of the film frame) --- */
#billing{position:absolute;left:0;right:0;bottom:0;z-index:4;
  padding:64px clamp(20px,5vw,72px) clamp(18px,3.4vh,34px);
  background:linear-gradient(transparent, rgba(8,7,6,.5) 38%, rgba(8,7,6,.94));
  opacity:0;transform:translateY(8px);transition:opacity .35s ease, transform .35s ease;
  pointer-events:none;}
#room.chrome #billing{opacity:1;transform:none;pointer-events:auto;}

.title-line{display:flex;align-items:baseline;gap:16px;flex-wrap:wrap;}
.title{font-family:var(--billing);font-weight:800;text-transform:uppercase;
  letter-spacing:.01em;line-height:.92;font-size:clamp(30px,5.6vw,76px);margin:0;}
.year{font-family:var(--display);font-weight:500;color:var(--ink-dim);
  font-size:clamp(16px,1.9vw,26px);letter-spacing:.08em;}
.kind{font-family:var(--display);font-weight:700;text-transform:uppercase;
  letter-spacing:.22em;font-size:12px;color:var(--marquee);margin-bottom:6px;}
.kind .dot{color:var(--ink-dim);margin:0 8px;}
.overview{font-size:clamp(13px,1.15vw,15.5px);line-height:1.5;color:var(--ink);
  opacity:.84;max-width:62ch;margin:10px 0 0;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

/* ratings — disciplined, monochrome, tabular. Colour belongs to the film. */
.ratings{display:flex;gap:18px;margin-top:14px;font-variant-numeric:tabular-nums;}
.chip{display:flex;align-items:baseline;gap:6px;}
.chip .src{font-family:var(--display);font-weight:700;text-transform:uppercase;
  letter-spacing:.14em;font-size:10px;color:var(--ink-dim);}
.chip .val{font-family:var(--billing);font-weight:700;font-size:21px;}

/* ---- icon control row --------------------------------------------------- */
.controls{display:flex;align-items:center;gap:6px;margin-top:18px;}
.sep{width:1px;height:26px;background:var(--hair);margin:0 8px;}
.ico{display:grid;place-items:center;width:44px;height:44px;border-radius:10px;
  background:rgba(242,235,223,.05);border:1px solid transparent;cursor:pointer;
  transition:background .15s, border-color .15s, transform .1s;}
.ico:hover,.ico:focus-visible{background:rgba(242,235,223,.1);border-color:var(--hair);outline:none;}
.ico:active{transform:translateY(1px);}
.ico.on{color:var(--marquee);border-color:rgba(233,180,76,.4);background:rgba(233,180,76,.1);}
.ico svg{width:21px;height:21px;fill:none;stroke:currentColor;stroke-width:1.7;
  stroke-linecap:round;stroke-linejoin:round;}
.autoadv{margin-left:auto;display:flex;align-items:center;gap:9px;
  font-family:var(--display);font-weight:500;letter-spacing:.12em;text-transform:uppercase;
  font-size:11px;color:var(--ink-dim);cursor:pointer;user-select:none;}
.switch{width:38px;height:21px;border-radius:999px;background:rgba(242,235,223,.14);
  position:relative;transition:background .2s;}
.switch::after{content:"";position:absolute;top:2px;left:2px;width:17px;height:17px;
  border-radius:50%;background:var(--ink-dim);transition:transform .2s, background .2s;}
.autoadv.on .switch{background:rgba(233,180,76,.35);}
.autoadv.on .switch::after{transform:translateX(17px);background:var(--marquee);}

/* ---- reel-position marker (you-are-here in the programme) ---------------- */
#posmark{position:absolute;top:clamp(16px,3vh,30px);left:clamp(20px,5vw,72px);z-index:4;
  opacity:0;transition:opacity .35s;}
#room.chrome #posmark{opacity:1;}
#posmark .pm-theme{font-family:var(--display);font-weight:700;text-transform:uppercase;
  letter-spacing:.2em;font-size:12px;color:var(--ink);}
#posmark .pm-sub{font-family:var(--display);letter-spacing:.16em;font-size:11px;
  color:var(--ink-dim);margin-top:3px;}
.dots{display:flex;gap:5px;margin-top:7px;}
.dots i{width:5px;height:5px;border-radius:50%;background:rgba(242,235,223,.22);}
.dots i.cur{background:var(--marquee);width:16px;border-radius:3px;}

/* ---- Programme board (start screen + re-summonable jump menu) ------------ */
#board{position:fixed;inset:0;z-index:9;background:
  radial-gradient(140% 100% at 50% 0%, #1b1712 0%, var(--auditorium) 60%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:5vh 6vw;opacity:1;transition:opacity .7s ease;}
#board.hide{opacity:0;pointer-events:none;}
.board-eyebrow{font-family:var(--display);font-weight:500;letter-spacing:.5em;
  text-transform:uppercase;font-size:12px;color:var(--marquee);margin-bottom:6px;}
.board-title{font-family:var(--billing);font-weight:800;text-transform:uppercase;
  font-size:clamp(40px,7vw,92px);line-height:.9;margin:0 0 4px;letter-spacing:.01em;}
.board-sub{color:var(--ink-dim);font-size:14px;margin:0 0 38px;text-align:center;max-width:46ch;}
.board-sub b{color:var(--ink);font-weight:600;}
.programme{width:min(720px,92vw);display:flex;flex-direction:column;gap:2px;}
.prog-row{display:flex;align-items:center;gap:18px;padding:12px 16px;border-radius:12px;
  cursor:pointer;border:1px solid transparent;transition:background .15s, border-color .15s;}
.prog-row:hover{background:rgba(242,235,223,.04);}
.prog-row.cur{background:rgba(233,180,76,.08);border-color:rgba(233,180,76,.3);}
.prog-still{width:96px;height:54px;border-radius:6px;background:#000 center/cover no-repeat;
  flex:0 0 auto;box-shadow:0 4px 18px rgba(0,0,0,.5);}
.prog-meta{flex:1;min-width:0;}
.prog-name{font-family:var(--display);font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;font-size:clamp(18px,2.4vw,26px);line-height:1;}
.prog-row.cur .prog-name{color:var(--marquee);}
.prog-tag{font-family:var(--display);letter-spacing:.18em;text-transform:uppercase;
  font-size:10px;color:var(--ink-dim);margin-top:5px;}
.prog-count{font-family:var(--billing);font-weight:700;font-size:22px;color:var(--ink-dim);}
.board-hint{margin-top:34px;color:var(--ink-dim);font-size:12px;letter-spacing:.04em;}
.board-hint kbd{font-family:var(--display);background:rgba(242,235,223,.08);
  border:1px solid var(--hair);border-radius:5px;padding:2px 7px;font-size:11px;color:var(--ink);}

/* ---- toast -------------------------------------------------------------- */
#toast{position:fixed;left:50%;bottom:clamp(24px,8vh,90px);transform:translateX(-50%) translateY(20px);
  z-index:8;background:rgba(20,17,15,.96);border:1px solid var(--hair);border-radius:999px;
  padding:11px 22px;font-size:13.5px;letter-spacing:.02em;opacity:0;
  transition:opacity .25s, transform .25s;box-shadow:0 12px 40px rgba(0,0,0,.6);white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast b{color:var(--marquee);font-weight:600;}

/* throwaway-proto ribbon */
#proto{position:fixed;right:10px;top:10px;z-index:20;font-family:var(--display);
  letter-spacing:.2em;text-transform:uppercase;font-size:9px;color:var(--ink-dim);
  border:1px solid var(--hair);border-radius:5px;padding:3px 8px;pointer-events:none;opacity:.6;}

@media (prefers-reduced-motion: reduce){*{transition:none !important;animation:none !important;}}
@media (max-width:640px){
  .controls{flex-wrap:wrap;}
  .autoadv{margin-left:0;width:100%;justify-content:flex-end;margin-top:6px;}
  .prog-still{width:64px;height:36px;}
}
</style>
</head>
<body>
<div id="proto">design preview</div>

<div id="room">
  <div id="spill"></div>
  <div id="vignette"></div>

  <div id="screen">
    <div id="poster"></div>
    <div id="player"></div>
    <div id="spinner"></div>
    <div id="cover"></div>

    <!-- reel position -->
    <div id="posmark">
      <div class="pm-theme" id="pmTheme">—</div>
      <div class="pm-sub" id="pmSub">—</div>
      <div class="dots" id="pmDots"></div>
    </div>

    <!-- billing block -->
    <div id="billing">
      <div class="kind" id="bKind"></div>
      <div class="title-line">
        <h1 class="title" id="bTitle">—</h1>
        <span class="year" id="bYear"></span>
      </div>
      <div class="ratings" id="bRatings"></div>
      <p class="overview" id="bOverview"></p>
      <div class="controls" id="bControls"></div>
    </div>
  </div>
</div>

<!-- Programme board: the start gesture (unlocks sound) AND the jump menu. -->
<div id="board">
  <div class="board-eyebrow">discovarr</div>
  <h2 class="board-title">Tonight's Programme</h2>
  <p class="board-sub">Pick where to start — this single press unlocks <b>sound-on autoplay</b>
    for the whole session, every device. Or just hit <b>OK</b> to begin from the top.</p>
  <div class="programme" id="programme"></div>
  <div class="board-hint">
    <kbd>↑</kbd><kbd>↓</kbd> choose &nbsp;·&nbsp; <kbd>↵ Enter</kbd> start &nbsp;·&nbsp;
    in the reel: <kbd>←</kbd><kbd>→</kbd> titles, <kbd>↑</kbd><kbd>↓</kbd> themes,
    <kbd>Space</kbd> pause, <kbd>M</kbd> this menu
  </div>
</div>

<div id="toast"></div>

<script>
/* ===========================================================================
   DEMO DATA — a few real trailers. Imagery is the YouTube thumbnail (always
   present → no broken posters). Bad IDs just trigger the skip logic, which is
   itself a feature on show. Edit freely. Ratings/overviews are illustrative.
   =========================================================================== */
const THEMES = [
  { id:"trending", label:"Trakt Trending", kind:"Standard", titles:[
    {t:"Dune: Part Two", y:2024, yt:"Way9Dexny3w", r:{imdb:"8.5",rt_critic:"92",rt_audience:"95"},
      o:"Paul Atreides unites with the Fremen to wage war against the conspirators who destroyed his family."},
    {t:"Oppenheimer", y:2023, yt:"uYPbbksJxIg", r:{imdb:"8.3",rt_critic:"93",rt_audience:"91"},
      o:"The story of J. Robert Oppenheimer and his role in the development of the atomic bomb."},
    {t:"The Batman", y:2022, yt:"mqqft2x_Aa4", r:{imdb:"7.8",rt_critic:"85",rt_audience:"87"},
      o:"A vengeful Batman tracks a sadistic killer through the corrupt streets of Gotham City."},
    {t:"Mad Max: Fury Road", y:2015, yt:"hEJnMQG9ev8", r:{imdb:"8.1",rt_critic:"97",rt_audience:"86"},
      o:"On a desert road two rebels run from a tyrant and his war boys in a relentless chase."},
  ]},
  { id:"gen-mind", label:"Mind-Benders", kind:"80s–10s · Generated", titles:[
    {t:"Inception", y:2010, yt:"YoHD9XEInc0", r:{imdb:"8.8",rt_critic:"87",rt_audience:"91"},
      o:"A thief who steals corporate secrets through dream-sharing is offered a chance to erase his past."},
    {t:"Interstellar", y:2014, yt:"zSWdZVtXT7E", r:{imdb:"8.7",rt_critic:"73",rt_audience:"86"},
      o:"Explorers travel through a wormhole in an attempt to ensure humanity's survival."},
    {t:"The Matrix", y:1999, yt:"vKQi3bBA1y8", r:{imdb:"8.7",rt_critic:"83",rt_audience:"85"},
      o:"A hacker learns the shocking truth about his reality and his role in the war against its controllers."},
    {t:"The Dark Knight", y:2008, yt:"EXeTwQWrcwY", r:{imdb:"9.0",rt_critic:"94",rt_audience:"94"},
      o:"Batman faces the Joker, a criminal mastermind bent on plunging Gotham into anarchy."},
  ]},
  { id:"bcw-bb", label:"Because you watched Breaking Bad", kind:"Personalised", titles:[
    {t:"Better Call Saul", y:2015, yt:"HtRGzMnLU5c", r:{imdb:"9.0",rt_critic:"98",rt_audience:"93"},
      o:"The trials of small-time lawyer Jimmy McGill on his way to becoming Saul Goodman."},
    {t:"Ozark", y:2017, yt:"5hAXVqrljbs", r:{imdb:"8.5",rt_critic:"81",rt_audience:"90"},
      o:"A financial adviser drags his family into money laundering for a drug cartel."},
    {t:"Stranger Things", y:2016, yt:"b9EkMc79ZSU", r:{imdb:"8.7",rt_critic:"92",rt_audience:"90"},
      o:"A small town uncovers a mystery of secret experiments and one very strange little girl."},
  ]},
];

const CHIPS = ["imdb","rt_critic","rt_audience"];      // from config.toml [ratings].chips
const CHIP_SRC = {imdb:"IMDb", rt_critic:"RT", rt_audience:"\u{1F37F}", metacritic:"MC"};
const thumb = (yt,q="maxresdefault") => `https://img.youtube.com/vi/${yt}/${q}.jpg`;

/* ---- ICONS (inline SVG, stroke) ---------------------------------------- */
const ICONS = {
  pause:'<rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/>',
  play:'<path d="M7 4l13 8-13 8z"/>',
  watchlist:'<path d="M6 4h12v16l-6-4-6 4z"/><path d="M12 8v5M9.5 10.5h5"/>',
  request:'<path d="M12 4v10m0 0l-4-4m4 4l4-4"/><path d="M5 19h14"/>',
  watched:'<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/>',
  like:'<path d="M12 3l2 5 5 .4-3.8 3.3 1.2 5L12 19l-4.6 2.7 1.2-5L4.8 8.4 9.8 8z"/>',
  director:'<path d="M3 8h18v11H3z"/><path d="M3 8l3-4 3 4M9 8l3-4 3 4M15 8l3-4 3 4"/>',
  cast:'<circle cx="9" cy="8" r="3"/><path d="M3 20c0-3.3 2.7-6 6-6s6 2.7 6 6"/><path d="M16 5a3 3 0 0 1 0 6M18 20c0-2.4-1-4.5-2.5-5.7"/>',
  hide:'<path d="M3 3l18 18"/><path d="M10.6 5.2A10 10 0 0 1 12 5c7 0 11 7 11 7a17 17 0 0 1-3.3 4M6.6 6.6A17 17 0 0 0 1 12s4 7 11 7a10 10 0 0 0 4-.8"/>',
  ditch:'<circle cx="12" cy="12" r="9"/><path d="M5.6 5.6l12.8 12.8"/>',
};
const ACTIONS = [
  {key:"pause",  group:0, label:"Pause", toggle:true},
  {key:"watchlist", group:1, label:"Watchlist → Trakt"},
  {key:"request",  group:1, label:"Request → Seerr"},
  {key:"watched",  group:1, label:"Mark watched → Trakt"},
  {key:"like",   group:2, label:"More like this"},
  {key:"director", group:2, label:"More from director"},
  {key:"cast",   group:2, label:"More with cast"},
  {key:"hide",   group:3, label:"Not for me"},
  {key:"ditch",  group:3, label:"Ditch this category"},
];

/* ---- state -------------------------------------------------------------- */
let ti=0, xi=0, dir=1, started=false, player=null, playerReady=false;
let settleTimer=null, hideChromeTimer=null, loadTimeout=null, skips=0, boardSel=0;
const $ = s => document.querySelector(s);
const room = $("#room");
const cur = () => THEMES[ti].titles[xi];

/* ---- YouTube IFrame API (proven player vars from the Step 0 spike) ------- */
const tag=document.createElement("script");
tag.src="https://www.youtube.com/iframe_api";
document.head.appendChild(tag);
window.onYouTubeIframeAPIReady=function(){
  player=new YT.Player("player",{width:"100%",height:"100%",
    playerVars:{autoplay:0,mute:0,controls:0,rel:0,playsinline:1,enablejsapi:1,
      modestbranding:1,iv_load_policy:3,disablekb:1,fs:0},
    events:{onReady:()=>{playerReady=true;}, onStateChange:onState, onError:onErr}});
};

/* ---- render the billing block + position marker ------------------------- */
function renderControls(){
  const box=$("#bControls"); box.innerHTML="";
  let g=-1;
  ACTIONS.forEach(a=>{
    if(g!==-1 && a.group!==g){const s=document.createElement("div");s.className="sep";box.appendChild(s);}
    g=a.group;
    const b=document.createElement("button");
    b.className="ico"; b.title=a.label; b.dataset.key=a.key;
    b.innerHTML=`<svg viewBox="0 0 24 24">${ICONS[a.key]}</svg>`;
    b.onclick=()=>doAction(a);
    box.appendChild(b);
  });
  const aa=document.createElement("label");
  aa.className="autoadv on"; aa.id="autoadvBtn";
  aa.innerHTML='Auto-advance <span class="switch"></span>';
  aa.onclick=()=>aa.classList.toggle("on");
  box.appendChild(aa);
}
function paintTitle(){
  const c=cur(), th=THEMES[ti];
  $("#bKind").innerHTML = `${th.label} <span class="dot">/</span> ${th.kind}`;
  $("#bTitle").textContent=c.t;
  $("#bYear").textContent=c.y;
  $("#bOverview").textContent=c.o;
  $("#bRatings").innerHTML = CHIPS.filter(k=>c.r[k]).map(k=>
    `<span class="chip"><span class="src">${CHIP_SRC[k]}</span><span class="val">${c.r[k]}</span></span>`).join("");
  // position marker
  $("#pmTheme").textContent=th.label;
  $("#pmSub").textContent=`Title ${xi+1} / ${th.titles.length}`;
  $("#pmDots").innerHTML=th.titles.map((_,i)=>`<i class="${i===xi?'cur':''}"></i>`).join("");
  // poster + spill (both from the YT thumbnail)
  const img=new Image();
  img.onload=()=>{ $("#poster").style.backgroundImage=`url(${thumb(c.yt)})`;
                   $("#spill").style.backgroundImage=`url(${thumb(c.yt,"hqdefault")})`; };
  img.onerror=()=>{ $("#poster").style.backgroundImage=`url(${thumb(c.yt,"hqdefault")})`;
                    $("#spill").style.backgroundImage=`url(${thumb(c.yt,"hqdefault")})`; };
  img.src=thumb(c.yt);
}

/* ---- load / play with debounce + skip safety --------------------------- */
function showChrome(persist){
  room.classList.add("chrome");
  clearTimeout(hideChromeTimer);
  if(!persist) hideChromeTimer=setTimeout(()=>room.classList.remove("chrome"),3200);
}
function land(){
  const c=cur();
  paintTitle(); showChrome(false);
  room.classList.add("lit");
  $("#screen").classList.remove("playing");
  $("#screen").classList.add("buffering");
  clearTimeout(settleTimer); clearTimeout(loadTimeout);
  // skip titles with no trailer outright
  if(!c.yt){ skipDud("no trailer"); return; }
  settleTimer=setTimeout(()=>{
    if(!playerReady) return;
    player.loadVideoById(c.yt); player.unMute(); player.setVolume(100);
    loadTimeout=setTimeout(()=>{ if($("#screen").classList.contains("buffering")) skipDud("timed out"); },8000);
  },400);
}
function onState(e){
  if(e.data===YT.PlayerState.PLAYING){
    skips=0; clearTimeout(loadTimeout);
    $("#screen").classList.remove("buffering");
    $("#screen").classList.add("playing");
  }
  if(e.data===YT.PlayerState.ENDED){
    if($("#autoadvBtn") && $("#autoadvBtn").classList.contains("on")){ dir=1; goTitle(1); } // channel loop
  }
}
function onErr(){ skipDud("unavailable"); }
function skipDud(why){
  skips++;
  if(skips>8){ toast("Nothing playable here right now — try ↓ for the next theme"); skips=0; return; }
  toast(`Trailer ${why} — skipping`);
  goTitle(dir||1);
}

/* ---- navigation (both axes wrap; ↓ past the end = fresh feed in prod) ---- */
function goTitle(d){ dir=d; const n=THEMES[ti].titles.length; xi=(xi+d+n)%n; land(); }
function goTheme(d){ dir=1; const n=THEMES.length; ti=(ti+d+n)%n; xi=0; land(); }

/* ---- actions (demo: just toast / toggle) ------------------------------- */
function doAction(a){
  if(a.key==="pause"){ togglePause(); return; }
  const msgs={
    watchlist:"Added to <b>Watchlist</b>", request:"Requested on <b>Seerr</b>",
    watched:"Marked <b>watched</b> on Trakt", hide:"Hidden — <b>not for me</b>",
    ditch:`Ditched <b>${THEMES[ti].label}</b>`,
    like:`Spawned <b>Because you liked ${cur().t}</b>`,
    director:"Spawned <b>More from the director</b>",
    cast:"Cast picker — <b>pick an actor</b> (top 10 headshots)",
  };
  toast(msgs[a.key]||a.label);
  if(["watchlist","watched"].includes(a.key)){
    const b=document.querySelector(`.ico[data-key="${a.key}"]`); if(b) b.classList.toggle("on");
  }
}
function togglePause(){
  if(!playerReady) return;
  const st=player.getPlayerState();
  if(st===YT.PlayerState.PLAYING){ player.pauseVideo(); showChrome(true); }
  else { player.playVideo(); showChrome(false); }
  const b=document.querySelector('.ico[data-key="pause"]');
  if(b) b.querySelector("svg").innerHTML = st===YT.PlayerState.PLAYING ? ICONS.play : ICONS.pause;
}

/* ---- toast -------------------------------------------------------------- */
let toastTimer=null;
function toast(html){ const t=$("#toast"); t.innerHTML=html; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),2200); }

/* ---- Programme board ---------------------------------------------------- */
function buildBoard(){
  const p=$("#programme"); p.innerHTML="";
  THEMES.forEach((th,i)=>{
    const row=document.createElement("div");
    row.className="prog-row"+(i===boardSel?" cur":"");
    row.innerHTML=`<div class="prog-still" style="background-image:url(${thumb(th.titles[0].yt,"hqdefault")})"></div>
      <div class="prog-meta"><div class="prog-name">${th.label}</div><div class="prog-tag">${th.kind}</div></div>
      <div class="prog-count">${th.titles.length}</div>`;
    row.onclick=()=>{ boardSel=i; startFrom(i); };
    p.appendChild(row);
  });
}
function moveBoard(d){ boardSel=(boardSel+d+THEMES.length)%THEMES.length; buildBoard(); }
function openBoard(){ boardSel=ti; buildBoard(); $("#board").classList.remove("hide"); }
function startFrom(i){
  ti=i; xi=0; dir=1;
  $("#board").classList.add("hide");           // house lights down
  if(!started){ started=true; }
  setTimeout(land, 350);                        // ...then the projector strikes
}

/* ---- keys --------------------------------------------------------------- */
document.addEventListener("keydown",e=>{
  const boardOpen=!$("#board").classList.contains("hide");
  if(boardOpen){
    if(e.key==="ArrowDown"){moveBoard(1);e.preventDefault();}
    else if(e.key==="ArrowUp"){moveBoard(-1);e.preventDefault();}
    else if(e.key==="Enter"||e.key===" "){startFrom(boardSel);e.preventDefault();}
    return;
  }
  switch(e.key){
    case "ArrowRight": goTitle(1); e.preventDefault(); break;
    case "ArrowLeft":  goTitle(-1); e.preventDefault(); break;
    case "ArrowDown":  goTheme(1); e.preventDefault(); break;
    case "ArrowUp":    goTheme(-1); e.preventDefault(); break;
    case " ":          togglePause(); e.preventDefault(); break;
    case "m": case "M": case "Escape": openBoard(); break;
    case "w": case "W": doAction({key:"watchlist"}); break;
    case "r": case "R": doAction({key:"request"}); break;
  }
});
// reveal chrome on mouse move / tap; cover tap toggles chrome
document.addEventListener("mousemove",()=>{ if(started) showChrome(false); });
$("#cover").addEventListener("click",()=>{ room.classList.toggle("chrome"); });

renderControls();
buildBoard();
</script>
</body>
</html>
