# config.toml — version-controlled discovarr config (NOT secrets; those live in
# .env, git-ignored + host-only). To change: edit, commit, then on the host:
#   git pull && docker compose -f app/docker-compose.yml up -d --build
# Missing/malformed values fall back to built-in defaults in main.py.

[themes]
titles_per_theme = 30          # cap per carousel (caps API hydration cost)

[cache]
title_seconds   = 86400        # 24h — metadata changes slowly
ratings_seconds = 21600        # 6h  — ratings move a bit faster
theme_seconds   = 43200        # 12h — list/trending resolutions + watched set

# --- ratings: which chips, in what order. Render-what-exists; blank when none. ---
[ratings]
chips = ["imdb", "rt_critic", "rt_audience"]   # add "metacritic"/"letterboxd" later

# --- Nav-bar STANDARD themes (fixed, recognisable, jump-to). ORDER = nav order, and
#     row 1 is the default landing. A row that resolves empty (e.g. an unauthed/empty
#     watchlist, or a rotted list) is dropped at serve time. mtype "both" = movies + TV
#     fetched and blended. ---
# source: trakt_watchlist | trakt_watched | trakt_trending | trakt_anticipated | tmdb_discover | mdblist
[[standard_themes]]
id = "watchlist"
label = "Your Watchlist"
source = "trakt_watchlist"          # movies + TV; hidden when empty -> you land on Top 10

[[standard_themes]]
id = "top10"
label = "Top 10 This Week"
source = "trakt_watched"
period = "weekly"                   # Trakt most-watched; movies+TV ranked by watcher count
cap = 10                            # exactly ten, in rank order (no shuffle)

[[standard_themes]]
id = "trending"
label = "Trending"
source = "trakt_trending"
mtype = "both"

[[standard_themes]]
id = "acclaimed"
label = "Critically Acclaimed"
source = "tmdb_discover"
mtype = "both"
params = { sort_by = "vote_average.desc", "vote_count.gte" = 2000 }   # TV floor auto-clamped to 300

[[standard_themes]]
id = "based-on-book"
label = "Based on a Book"
source = "mdblist"                  # film + TV book adaptations, merged
list_ids = ["k0meta/based_on_books_movies", "k0meta/based_on_books_shows"]

[[standard_themes]]
id = "anticipated"
label = "Anticipated"
source = "trakt_anticipated"        # most-anticipated upcoming
mtype = "both"

# --- Generated ↑/↓ reel dimensions (TMDB Discover). genres = TMDB genre ids. ---
[generated]
decades = [1980, 1990, 2000, 2010, 2020]

[generated.genres]
"Sci-Fi"      = 878
"Thrillers"   = 53
"Comedies"    = 35
"Horror"      = 27
"Action"      = 28
"Crime"       = 80
"Drama"       = 18
"Animation"   = 16
"Documentary" = 99
"Fantasy"     = 14
"Romance"     = 10749
"Mystery"     = 9648
